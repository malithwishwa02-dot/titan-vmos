name: titan-vmos-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check core/ server/

      - name: Type check with mypy
        run: mypy core/ server/ --ignore-missing-imports
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests
        env:
          PYTHONPATH: core:server
        run: python -m pytest tests/ -x -v --tb=short -m "not e2e and not integration" || true

  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: titan-vmospro-standalone
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Unit tests
        run: go test ./...

      - name: Build binaries
        run: bash scripts/build.sh
