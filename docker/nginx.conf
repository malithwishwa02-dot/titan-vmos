# Titan V12.0 — Nginx reverse proxy (SSL + WebSocket + gzip)
# Routes: / → console, /api → FastAPI, /ws → WebSocket, /scrcpy → ws-scrcpy

upstream titan_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

upstream ws_scrcpy {
    server 127.0.0.1:8000;
}

server {
    listen 127.0.0.1:80;
    server_name localhost;
    return 301 https://127.0.0.1$request_uri;
}

server {
    listen 127.0.0.1:443 ssl http2;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ─── Security Headers ────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Console SPA ─────────────────────────────────────────────
    location / {
        proxy_pass http://titan_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── API ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://titan_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # ─── WebSocket streams (screen, logs) ────────────────────────
    location /ws/ {
        proxy_pass http://titan_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # ─── ws-scrcpy H264 streaming ────────────────────────────────
    location /scrcpy/ {
        proxy_pass http://ws_scrcpy/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}
