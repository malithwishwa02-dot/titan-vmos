version: "3.8"
# ═══════════════════════════════════════════════════════════════════
# Titan Cloud Phone — Production Deployment (Cuttlefish Backend)
# Deploy with: docker-compose -f docker-compose.prod.yml up -d
#
# NOTE: Android devices run as Cuttlefish KVM VMs managed by the
# Titan API via launch_cvd/stop_cvd — NOT as Docker containers.
# Only the API server, ws-scrcpy, and nginx run in Docker.
#
# Access:
#   https://your-server/            → Titan Console
#   https://your-server/scrcpy/     → H264 Cloud Phone
#   https://your-server/mobile#ID   → Mobile viewer + AI agent
#   https://your-server/api/        → REST API
#
# Requirements:
#   - Linux host with KVM support (/dev/kvm)
#   - Cuttlefish host tools installed (launch_cvd, stop_cvd)
#   - Kernel modules: vhost_vsock, vhost_net, v4l2loopback
#   - 8+ CPU cores, 16+ GB RAM, 40+ GB disk
# ═══════════════════════════════════════════════════════════════════

services:
  # ─── TITAN API SERVER ─────────────────────────────────────────
  # Manages Cuttlefish VMs on the host via launch_cvd/stop_cvd.
  # Requires host network + ADB access to communicate with VMs.
  titan-api:
    image: python:3.12-slim
    container_name: titan-api
    restart: unless-stopped
    working_dir: /opt/titan
    network_mode: host
    ports:
      - "8080:8080"
    volumes:
      - ../core:/opt/titan/core:ro
      - ../server:/opt/titan/server:ro
      - ../console:/opt/titan/console:ro
      - titan-data:/opt/titan/data
      - /opt/titan/cuttlefish:/opt/titan/cuttlefish
      - /opt/android-cuttlefish:/opt/android-cuttlefish:ro
      - /usr/bin/adb:/usr/bin/adb
      - /root/.android:/root/.android
    environment:
      - PYTHONPATH=/opt/titan/server:/opt/titan/core
      - TITAN_DATA=/opt/titan/data
      - CVD_BIN_DIR=${CVD_BIN_DIR:-/opt/android-cuttlefish/bin}
      - CVD_IMAGES_DIR=${CVD_IMAGES_DIR:-/opt/titan/cuttlefish/images}
      - CVD_HOME_BASE=${CVD_HOME_BASE:-/opt/titan/cuttlefish}
      - TITAN_GPU_OLLAMA=${TITAN_GPU_OLLAMA:-http://127.0.0.1:11435}
    command: >
      bash -c "
        pip install -q fastapi uvicorn pydantic pillow 2>/dev/null &&
        python3 -m uvicorn server.titan_api:app --host 127.0.0.1 --port 8080 --workers 2 --loop uvloop --http httptools
      "

  # ─── WS-SCRCPY (H264 Cloud Phone) ─────────────────────────────
  ws-scrcpy:
    image: scavin/ws-scrcpy:latest
    container_name: titan-scrcpy
    restart: unless-stopped
    network_mode: host
    volumes:
      - /usr/bin/adb:/usr/bin/adb
      - /root/.android:/root/.android

  # ─── NGINX (SSL + Routing) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: titan-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - titan-api
      - ws-scrcpy

volumes:
  titan-data:
